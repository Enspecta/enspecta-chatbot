<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enspecta — Aida Chatbot Demo</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      background: #f0f4f8;
    }
    header {
      background: #1d6e45;
      color: #fff;
      padding: 20px 40px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .hero {
      max-width: 700px;
      margin: 80px auto;
      text-align: center;
      padding: 0 24px;
    }
    h1 {
      font-size: 36px;
      color: #1d6e45;
      margin-bottom: 16px;
    }
    p {
      font-size: 18px;
      color: #555;
      line-height: 1.6;
    }
    .hint {
      margin-top: 48px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>
  <header>Enspecta</header>
  <div class="hero">
    <h1>Välkommen till Enspecta</h1>
    <p>Certifierade och oberoende besiktningsmän. Vi hjälper dig att fatta rätt beslut vid köp, sälj eller byggprojekt.</p>
    <p class="hint">Klicka på chattknappen nere till höger för att prata med Aida 💬</p>
  </div>
  <script src="https://enspecta-chatbot.onrender.com/widget.js"></script>
</body>
</html>
