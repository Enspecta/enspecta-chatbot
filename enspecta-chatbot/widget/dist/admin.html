<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enspecta Admin — Aida Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #f0f4f8; color: #1a1a1a; min-height: 100vh; }

    /* ── Login ── */
    #login-overlay {
      position: fixed; inset: 0; background: #f0f4f8;
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .login-card {
      background: #fff; border-radius: 16px; padding: 40px 36px;
      width: 100%; max-width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
      display: flex; flex-direction: column; gap: 16px;
    }
    .login-brand {
      font-size: 13px; font-weight: 600; color: #1a3c5e;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .login-card h1 { font-size: 22px; font-weight: 700; color: #1a3c5e; }
    .login-card p { font-size: 14px; color: #666; }
    .login-card input {
      border: 1.5px solid #d0dce8; border-radius: 10px;
      padding: 11px 14px; font-size: 14px; font-family: inherit;
      width: 100%; transition: border-color 0.15s;
    }
    .login-card input:focus { outline: none; border-color: #1a3c5e; }
    .login-card button {
      background: #1a3c5e; color: #fff; border: none;
      border-radius: 10px; padding: 12px; font-size: 14px;
      font-weight: 600; cursor: pointer; font-family: inherit;
      transition: background 0.15s;
    }
    .login-card button:hover { background: #245080; }
    .login-error { font-size: 13px; color: #c0392b; min-height: 18px; }

    /* ── Dashboard ── */
    #dashboard { display: none; flex-direction: column; min-height: 100vh; }
    #dashboard.visible { display: flex; }

    header {
      background: linear-gradient(135deg, #1a3c5e 0%, #1e5491 100%);
      color: #fff; padding: 0 32px;
      display: flex; align-items: center; gap: 16px; height: 64px;
    }
    .header-brand { font-weight: 700; font-size: 16px; }
    .header-sub { font-size: 12px; opacity: 0.65; }
    .header-spacer { flex: 1; }
    #logout-btn {
      background: rgba(255,255,255,0.15); color: #fff; border: none;
      border-radius: 8px; padding: 7px 14px; font-size: 13px;
      cursor: pointer; font-family: inherit; transition: background 0.15s;
    }
    #logout-btn:hover { background: rgba(255,255,255,0.25); }

    main { padding: 28px 32px; display: flex; flex-direction: column; gap: 24px; max-width: 1200px; width: 100%; margin: 0 auto; }

    /* ── Stat cards ── */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    @media (max-width: 800px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    .stat-card {
      background: #fff; border-radius: 12px; padding: 20px 22px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .stat-label { font-size: 12px; color: #888; font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }
    .stat-value { font-size: 32px; font-weight: 700; color: #1a3c5e; margin-top: 6px; }
    .stat-value.error { color: #c0392b; }

    /* ── Cards ── */
    .card {
      background: #fff; border-radius: 12px; padding: 22px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .card h2 { font-size: 15px; font-weight: 600; color: #1a3c5e; margin-bottom: 16px; }

    /* ── Chart ── */
    .chart-wrap { height: 200px; }

    /* ── Two columns ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

    /* ── Top questions table ── */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      text-align: left; padding: 8px 10px;
      border-bottom: 2px solid #e4edf6;
      font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.4px; color: #888;
    }
    tbody tr:nth-child(even) { background: #f8fafc; }
    tbody td { padding: 8px 10px; border-bottom: 1px solid #f0f4f8; }
    tbody td:first-child { color: #aab; font-weight: 600; width: 32px; }
    tbody td:last-child { color: #1a3c5e; font-weight: 600; width: 52px; }
    .q-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 260px; }

    /* ── Recent logs ── */
    .log-list { display: flex; flex-direction: column; gap: 10px; max-height: 420px; overflow-y: auto; }
    .log-item {
      border: 1px solid #e4edf6; border-radius: 10px; padding: 12px 14px;
      font-size: 13px;
    }
    .log-item.error-item { border-color: #fad7d7; background: #fff8f8; }
    .log-meta { font-size: 11px; color: #aab; margin-bottom: 5px; }
    .log-q { font-weight: 500; color: #1a3c5e; margin-bottom: 4px; }
    .log-a { color: #555; }

    /* ── Loading / error ── */
    .loading { color: #888; font-size: 14px; text-align: center; padding: 40px 0; }
  </style>
</head>
<body>

<!-- Login overlay -->
<div id="login-overlay">
  <div class="login-card">
    <div class="login-brand">Enspecta</div>
    <h1>Admin-portal</h1>
    <p>Logga in för att se Aida-statistik</p>
    <input type="password" id="pw-input" placeholder="Lösenord" autocomplete="current-password">
    <button id="login-btn">Logga in</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <header>
    <div>
      <div class="header-brand">Enspecta Admin</div>
      <div class="header-sub">Aida · Chatbot Analytics</div>
    </div>
    <div class="header-spacer"></div>
    <button id="logout-btn">Logga ut</button>
  </header>

  <main>
    <div id="dash-error" style="background:#fff0f0;color:#c0392b;padding:14px 18px;border-radius:10px;font-size:14px;display:none;"></div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Totalt meddelanden</div>
        <div class="stat-value" id="s-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Idag</div>
        <div class="stat-value" id="s-today">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Denna vecka</div>
        <div class="stat-value" id="s-week">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Fel</div>
        <div class="stat-value error" id="s-errors">—</div>
      </div>
    </div>

    <div class="card">
      <h2>Meddelanden per dag — senaste 7 dagarna</h2>
      <div class="chart-wrap"><canvas id="daily-chart"></canvas></div>
    </div>

    <div class="two-col">
      <div class="card">
        <h2>Topp 20 vanligaste frågor</h2>
        <table>
          <thead><tr><th>#</th><th>Fråga</th><th>Antal</th></tr></thead>
          <tbody id="top-tbody"><tr><td colspan="3" class="loading">Laddar…</td></tr></tbody>
        </table>
      </div>

      <div class="card">
        <h2>Senaste konversationer</h2>
        <div class="log-list" id="log-list"><div class="loading">Laddar…</div></div>
      </div>
    </div>
  </main>
</div>

<script>
  const API = '/api/admin/stats';
  let token = sessionStorage.getItem('admin_token') || '';
  let chart = null;

  function fmt(d) {
    return new Date(d).toLocaleString('sv-SE', { dateStyle: 'short', timeStyle: 'short' });
  }

  async function loadStats() {
    const res = await fetch(API, { headers: { Authorization: `Bearer ${token}` } });
    if (res.status === 401) { logout(); return; }
    const body = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
    return body;
  }

  function renderStats(data) {
    document.getElementById('s-total').textContent = data.totalMessages.toLocaleString('sv-SE');
    document.getElementById('s-today').textContent = data.todayMessages.toLocaleString('sv-SE');
    document.getElementById('s-week').textContent = data.weekMessages.toLocaleString('sv-SE');
    document.getElementById('s-errors').textContent = data.errorCount.toLocaleString('sv-SE');
  }

  function renderChart(daily) {
    const labels = daily.map(d => d.day);
    const msgs = daily.map(d => Number(d.messages));
    const ctx = document.getElementById('daily-chart').getContext('2d');
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Meddelanden',
          data: msgs,
          backgroundColor: '#1a3c5e',
          borderRadius: 6,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, ticks: { precision: 0 }, grid: { color: '#f0f4f8' } },
          x: { grid: { display: false } }
        }
      }
    });
  }

  function renderTopQuestions(rows) {
    const tbody = document.getElementById('top-tbody');
    if (!rows.length) { tbody.innerHTML = '<tr><td colspan="3" class="loading">Inga frågor ännu</td></tr>'; return; }
    tbody.innerHTML = rows.map((r, i) => `
      <tr>
        <td>${i + 1}</td>
        <td><div class="q-text" title="${r.question.replace(/"/g, '&quot;')}">${esc(r.question)}</div></td>
        <td>${r.cnt}</td>
      </tr>`).join('');
  }

  function renderLogs(logs) {
    const el = document.getElementById('log-list');
    if (!logs.length) { el.innerHTML = '<div class="loading">Inga konversationer ännu</div>'; return; }
    el.innerHTML = logs.map(l => `
      <div class="log-item${l.had_error ? ' error-item' : ''}">
        <div class="log-meta">${fmt(l.created_at)}${l.had_error ? ' · ⚠ fel' : ''}</div>
        <div class="log-q">❓ ${esc(l.user_message)}</div>
        ${l.bot_reply ? `<div class="log-a">💬 ${esc(l.bot_reply.slice(0, 120))}${l.bot_reply.length > 120 ? '…' : ''}</div>` : ''}
      </div>`).join('');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function showDashboard() {
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('dashboard').classList.add('visible');
    try {
      const data = await loadStats();
      if (!data) return;
      renderStats(data);
      renderChart(data.dailyChats);
      renderTopQuestions(data.topQuestions);
      renderLogs(data.recentLogs);
    } catch (e) {
      const el = document.getElementById('dash-error');
      el.textContent = 'Fel: ' + e.message;
      el.style.display = 'block';
    }
  }

  function logout() {
    token = '';
    sessionStorage.removeItem('admin_token');
    document.getElementById('dashboard').classList.remove('visible');
    document.getElementById('login-overlay').style.display = 'flex';
    document.getElementById('login-error').textContent = '';
  }

  document.getElementById('login-btn').addEventListener('click', async () => {
    const pw = document.getElementById('pw-input').value;
    if (!pw) return;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    const res = await fetch(API, { headers: { Authorization: `Bearer ${pw}` } });
    if (res.status === 401) { errEl.textContent = 'Fel lösenord.'; return; }
    if (res.status === 503) { errEl.textContent = 'Admin eller analytics inte konfigurerat på servern.'; return; }
    token = pw;
    sessionStorage.setItem('admin_token', token);
    showDashboard();
  });

  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });

  document.getElementById('logout-btn').addEventListener('click', logout);

  // Auto-login if token stored
  if (token) showDashboard();
</script>
</body>
</html>
